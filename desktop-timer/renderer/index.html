<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://www.archtimepro.it https://unpkg.com https://*.supabase.co; script-src 'self' 'unsafe-inline' https://www.archtimepro.it https://unpkg.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://www.archtimepro.it https://*.supabase.co wss://*.supabase.co; img-src 'self' data:;">
  <title>Arch Time Mini Timer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.archtimepro.it/assets/js/00-runtime-config.js?v=desktop-2026-05-17"></script>
</head>
<body>
  <main class="app-shell">
    <section id="login-view" class="view">
      <div class="brand-row">
        <div class="brand-mark">
          <img src="../assets/icon.png" alt="">
        </div>
        <div>
          <p class="eyebrow">Desktop companion</p>
          <h1>Arch Time Mini Timer</h1>
        </div>
      </div>

      <div class="login-panel">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" autocomplete="email" placeholder="nome@studio.it">

        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" placeholder="Password">

        <button id="btn-login" class="primary-button" type="button">
          <i data-lucide="log-in" width="17" height="17"></i>
          <span>Accedi</span>
        </button>

        <p id="login-status" class="notice hidden"></p>
      </div>
    </section>

    <section id="timer-view" class="view hidden">
      <header class="desktop-header">
        <div>
          <p class="eyebrow">Arch Time Pro</p>
          <h1>Registra tempo</h1>
        </div>
        <div class="header-actions">
          <button id="btn-window-minimize" class="window-button" type="button" title="Riduci">
            <i data-lucide="minus" width="14" height="14"></i>
          </button>
          <button id="btn-window-close" class="window-button" type="button" title="Chiudi">
            <i data-lucide="x" width="14" height="14"></i>
          </button>
          <button id="btn-logout" class="icon-button" type="button" title="Esci">
            <i data-lucide="log-out" width="17" height="17"></i>
          </button>
        </div>
      </header>

      <div class="user-strip">
        <strong id="user-label">-</strong>
      </div>

      <div class="field-stack">
        <div class="field-row">
          <label for="project-select">Progetto</label>
          <select id="project-select"></select>
        </div>
        <div class="field-row">
          <label for="task-select">Attivita</label>
          <select id="task-select"></select>
        </div>
      </div>

      <nav class="mode-tabs" aria-label="Modalita inserimento">
        <button id="tab-timer" class="active" type="button">Timer</button>
        <button id="tab-manual" type="button">Ore manuali</button>
      </nav>

      <section id="timer-panel" class="work-panel">
        <div class="timer-stack">
          <div id="compact-context" class="compact-context">-</div>
          <div id="timer-display" class="timer-display">00:00:00</div>
        </div>
        <button id="btn-toggle-timer" class="primary-button timer-button" type="button">
          <i data-lucide="play-circle" width="18" height="18"></i>
          <span>Avvia</span>
        </button>
      </section>

      <section id="manual-panel" class="work-panel hidden">
        <div class="manual-grid">
          <div>
            <label for="manual-date">Data</label>
            <input id="manual-date" type="date">
          </div>
          <div>
            <label for="manual-hours">Ore</label>
            <input id="manual-hours" type="text" inputmode="decimal" placeholder="01:30">
          </div>
          <div>
            <label for="manual-start">Inizio</label>
            <input id="manual-start" type="time">
          </div>
          <div>
            <label for="manual-end">Fine</label>
            <input id="manual-end" type="time">
          </div>
        </div>
        <button id="btn-save-manual" class="primary-button" type="button">
          <i data-lucide="check" width="17" height="17"></i>
          <span>Salva ore</span>
        </button>
      </section>

      <div class="notes-block">
        <label for="notes">Note</label>
        <textarea id="notes" placeholder="Descrizione breve"></textarea>
      </div>

      <footer class="footer-actions">
        <button id="btn-refresh" class="ghost-button" type="button">
          <i data-lucide="refresh-cw" width="15" height="15"></i>
          <span>Aggiorna progetti</span>
        </button>
        <p id="app-status" class="notice hidden"></p>
      </footer>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
