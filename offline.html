<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#172033">
    <meta name="robots" content="noindex, nofollow">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
    <title>Connessione assente | Arch Time Pro</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: #f3f5f7;
            color: #172033;
            font-family: Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        main {
            width: min(100%, 420px);
            border: 1px solid #d8dee6;
            border-radius: 14px;
            background: #ffffff;
            padding: 28px;
            text-align: center;
        }
        .mark {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            margin: 0 auto 18px;
            background: #172033;
            color: #ffffff;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.04em;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 22px;
            line-height: 1.1;
            letter-spacing: -0.01em;
        }
        p {
            margin: 0;
            color: #64748b;
            font-size: 14px;
            line-height: 1.55;
        }
        button {
            margin-top: 20px;
            width: 100%;
            border: 0;
            border-radius: 10px;
            background: #172033;
            color: #ffffff;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <div class="mark">ATP</div>
        <h1>Connessione assente</h1>
        <p>Arch Time Pro ha bisogno della rete per sincronizzare login, progetti, ore e report.</p>
        <button type="button" onclick="window.location.reload()">Riprova</button>
    </main>
</body>
</html>
