name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          STRIPE_LINK_STARTER: ${{ secrets.STRIPE_LINK_STARTER }}
          STRIPE_LINK_PREMIUM: ${{ secrets.STRIPE_LINK_PREMIUM }}
          STRIPE_CUSTOMER_PORTAL: ${{ secrets.STRIPE_CUSTOMER_PORTAL }}
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/assets
          cp index.html app.html guida.html privacy.html termini.html feedback.html sicurezza.html robots.txt .nojekyll dist/
          cp assets/app.css dist/assets/app.css
          cp -R assets/js dist/assets/js
          cp -f mockup.png dist/ 2>/dev/null || true
          rm -f dist/assets/js/00-runtime-config.js
          cat > dist/assets/js/00-runtime-config.js <<EOF
          // Arch Time Pro - production runtime configuration
          window.ARCH_TIME_CONFIG = {
              environment: 'development',
              supabaseUrl: '${SUPABASE_URL}',
              supabaseKey: '${SUPABASE_PUBLISHABLE_KEY}',
              stripeLinks: {
                  starter: '${STRIPE_LINK_STARTER}',
                  premium: '${STRIPE_LINK_PREMIUM}',
                  customerPortal: '${STRIPE_CUSTOMER_PORTAL}'
              }
          };
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
