name: Build Tauri desktop timer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "desktop-timer-tauri/**"
      - ".github/workflows/build-tauri-timer.yml"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop-timer-tauri/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-timer-tauri/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop-timer-tauri
        run: npm ci

      - name: Build NSIS installer
        working-directory: desktop-timer-tauri
        run: npm run build

      - name: Prepare release asset
        shell: pwsh
        run: |
          $source = Get-ChildItem "desktop-timer-tauri/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $source) { throw "Installer NSIS non trovato" }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item $source.FullName "release-assets/Arch-Time-Mini-Timer-Light-Setup-0.2.2.exe"

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view timer-v0.2.2 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create timer-v0.2.2 --title "Arch Time Mini Timer 0.2.2" --notes "Timer desktop leggero per Windows, sincronizzato con Arch Time Pro."
          }
          gh release upload timer-v0.2.2 "release-assets/Arch-Time-Mini-Timer-Light-Setup-0.2.2.exe" --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arch-Time-Mini-Timer-Light-0.2.2
          path: release-assets/Arch-Time-Mini-Timer-Light-Setup-0.2.2.exe
