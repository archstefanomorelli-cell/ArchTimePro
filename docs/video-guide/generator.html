<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arch Time Pro - Generatore video guida</title>
    <style>
        :root {
            --primary: #4f46e5;
            --ink: #0f172a;
            --muted: #64748b;
            --line: #e2e8f0;
            --paper: #ffffff;
            --soft: #f8fafc;
            --green: #059669;
            --amber: #d97706;
            --red: #dc2626;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #eef2f7;
            color: var(--ink);
            min-height: 100vh;
            padding: 28px;
        }

        main {
            max-width: 1180px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 22px;
            align-items: start;
        }

        canvas {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--soft);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        }

        aside {
            background: white;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        h1 {
            font-size: 19px;
            margin: 0 0 6px;
            letter-spacing: -0.03em;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .clip-list {
            display: grid;
            gap: 8px;
            margin-top: 18px;
        }

        button {
            border: 1px solid var(--line);
            background: white;
            color: var(--ink);
            border-radius: 12px;
            padding: 11px 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        button:hover {
            border-color: #c7d2fe;
            background: #eef2ff;
            color: var(--primary);
        }

        button.primary {
            background: var(--ink);
            color: white;
            border-color: var(--ink);
            text-align: center;
            margin-top: 14px;
        }

        button.primary:hover { background: #1e293b; color: white; }
        button[disabled] { opacity: 0.5; cursor: not-allowed; }

        .status {
            margin-top: 12px;
            min-height: 36px;
            padding: 10px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        @media (max-width: 900px) {
            body { padding: 14px; }
            main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main>
        <canvas id="stage" width="1920" height="1080"></canvas>
        <aside>
            <h1>Video guida Arch Time Pro</h1>
            <p>Genera clip WebM dimostrative con dati finti e testi sovraimpressi. Ogni file viene scaricato dal browser.</p>
            <div class="clip-list" id="clip-list"></div>
            <button class="primary" id="render-all">Genera tutte le clip</button>
            <div class="status" id="status">Pronto.</div>
        </aside>
    </main>

    <script>
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        const statusBox = document.getElementById('status');
        const W = canvas.width;
        const H = canvas.height;
        const FPS = 30;
        const DURATION = 13;

        const clips = [
            {
                id: '01-primo-accesso',
                title: 'Primo accesso',
                overlay: [
                    [0, 3.6, 'Configura lo studio in pochi passaggi'],
                    [3.6, 7.4, 'Il costo orario alimenta costi e margini'],
                    [7.4, 13, 'Puoi modificarlo quando vuoi dalla tab Team']
                ],
                flow: ['login', 'onboardingIdentity', 'onboardingRate', 'firstProject']
            },
            {
                id: '02-creazione-progetto',
                title: 'Creazione progetto',
                overlay: [
                    [0, 3.4, 'Crea un progetto senza imparare un gestionale'],
                    [3.4, 7.2, 'Scegli budget libero o somma attivita'],
                    [7.2, 13, 'Le voci fuori piano non avanzano il ritmo, ma consumano margine']
                ],
                flow: ['dashboard', 'projectModal', 'budgetMode', 'taskPlan']
            },
            {
                id: '03-registrazione-ore',
                title: 'Registrazione ore',
                overlay: [
                    [0, 3.5, 'Seleziona progetto e attivita'],
                    [3.5, 7.4, 'Avvia il timer quando lavori in diretta'],
                    [7.4, 13, 'Oppure inserisci manualmente le ore gia fatte']
                ],
                flow: ['timerReady', 'timerRunning', 'timerSaved', 'manualHours']
            },
            {
                id: '04-ritmo-progetto',
                title: 'Ritmo progetto',
                overlay: [
                    [0, 3.5, 'Il ritmo confronta avanzamento e costi reali'],
                    [3.5, 7.4, 'Le attivita concluse pesano in base al piano costi'],
                    [7.4, 13, 'Se i costi corrono troppo, lo vedi subito']
                ],
                flow: ['projectDetail', 'taskStatus', 'rhythmBar', 'warning']
            },
            {
                id: '05-team-costi',
                title: 'Team e costi orari',
                overlay: [
                    [0, 3.6, 'Ogni membro ha il suo costo interno'],
                    [3.6, 7.5, 'Modificalo dalla tab Team'],
                    [7.5, 13, 'Report e margini usano questi valori']
                ],
                flow: ['teamPanel', 'memberEdit', 'hourlyCost', 'teamSaved']
            },
            {
                id: '06-dashboard-report',
                title: 'Dashboard e report',
                overlay: [
                    [0, 3.5, 'La dashboard resta compatta'],
                    [3.5, 7.6, 'I grafici sono nel dettaglio quando servono'],
                    [7.6, 13, 'Esporta report chiari per analisi interne']
                ],
                flow: ['dashboard', 'compactInsights', 'analyticsModal', 'report']
            }
        ];

        const clipList = document.getElementById('clip-list');
        clips.forEach(clip => {
            const button = document.createElement('button');
            button.textContent = clip.title;
            button.addEventListener('click', () => renderClip(clip));
            clipList.appendChild(button);
        });
        document.getElementById('render-all').addEventListener('click', async () => {
            for (const clip of clips) await renderClip(clip);
        });

        function setStatus(text) {
            statusBox.textContent = text;
        }

        function ease(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function roundedRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        function fillRound(x, y, w, h, r, fill, stroke = null) {
            roundedRect(x, y, w, h, r);
            ctx.fillStyle = fill;
            ctx.fill();
            if (stroke) {
                ctx.strokeStyle = stroke;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function text(str, x, y, size, weight = 700, color = '#0f172a', align = 'left') {
            ctx.font = `${weight} ${size}px Inter, Arial, sans-serif`;
            ctx.fillStyle = color;
            ctx.textAlign = align;
            ctx.textBaseline = 'top';
            ctx.fillText(str, x, y);
        }

        function money(str, x, y, color = '#0f172a') {
            text(str, x, y, 34, 900, color);
        }

        function drawShell(t, active = 'Lavoro') {
            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(0, 0, W, H);
            fillRound(70, 48, 1780, 78, 0, '#ffffff', '#e2e8f0');
            text('ARCH', 105, 72, 28, 900);
            text('TIME', 188, 72, 28, 900, '#4f46e5');
            text('PRO', 275, 72, 28, 900);
            text('Studio Demo Morelli', 105, 104, 15, 800, '#94a3b8');
            text('Report PDF', 1510, 76, 16, 800, '#475569');
            fillRound(1665, 66, 128, 36, 10, '#ffffff', '#e2e8f0');
            text('STEFANO', 1690, 77, 13, 900, '#475569');

            const nav = ['Lavoro', 'Analisi', 'Gestione'];
            nav.forEach((item, i) => {
                const x = 100 + i * 135;
                const selected = item === active;
                fillRound(x, 150, 112, 36, 10, selected ? '#eef2ff' : '#ffffff', selected ? '#c7d2fe' : '#e2e8f0');
                text(item, x + 56, 161, 13, 900, selected ? '#4f46e5' : '#64748b', 'center');
            });
        }

        function card(x, y, w, h, title) {
            fillRound(x, y, w, h, 22, '#ffffff', '#e2e8f0');
            if (title) text(title, x + 26, y + 24, 20, 900);
        }

        function input(x, y, w, label, value = '') {
            text(label, x, y, 12, 900, '#64748b');
            fillRound(x, y + 24, w, 48, 12, '#ffffff', '#e2e8f0');
            if (value) text(value, x + 16, y + 38, 16, 800, '#334155');
        }

        function button(x, y, w, label, dark = false) {
            fillRound(x, y, w, 44, 12, dark ? '#0f172a' : '#ffffff', dark ? '#0f172a' : '#e2e8f0');
            text(label, x + w / 2, y + 14, 13, 900, dark ? '#ffffff' : '#475569', 'center');
        }

        function drawDashboard(t) {
            drawShell(t, 'Analisi');
            const p = ease(Math.min(1, t / 2));
            card(100, 220, 520, 470, 'Timer');
            input(130, 280, 450, 'PROGETTO', 'Villa Rossi');
            input(130, 368, 450, 'ATTIVITA', 'Progetto definitivo');
            text('00:48:12', 360, 485, 56, 900, '#0f172a', 'center');
            button(130, 590, 450, 'AVVIA ORA', true);

            card(660, 220, 1160, 230, 'Salute finanziaria');
            kpi(700, 290, 'Margine lavori attivi', 'EUR 7.420', '#4f46e5');
            kpi(1040, 290, 'Utile archiviati', 'EUR 14.880', '#059669');
            kpi(1380, 290, 'Progetto piu oneroso', 'Centro medico', '#d97706');
            fillRound(660, 480, 1160, 118, 22, '#ffffff', '#e2e8f0');
            insight(700, 510, 'Fuori budget', '0', '#059669');
            insight(1020, 510, 'Da monitorare', '2', '#d97706');
            insight(1340, 510, 'Assorbimento', 'Riunioni', '#4f46e5');
            button(1645, 516, 130, 'DETTAGLIO', false);

            card(660, 630, 1160, 270, 'Progetti attivi');
            projectCard(700, 700, 'Villa Rossi', p * 64, 'Allineato');
            projectCard(1240, 700, 'Studio dentistico', p * 82, 'Da monitorare');
        }

        function kpi(x, y, label, value, color) {
            fillRound(x, y, 295, 120, 18, '#f8fafc', '#e2e8f0');
            text(label, x + 20, y + 22, 13, 900, color);
            money(value, x + 20, y + 55, color);
        }

        function insight(x, y, label, value, color) {
            fillRound(x, y, 250, 58, 14, '#f8fafc', '#e2e8f0');
            text(label, x + 16, y + 12, 11, 900, '#64748b');
            text(value, x + 220, y + 15, 22, 900, color, 'right');
        }

        function projectCard(x, y, name, percent, status) {
            fillRound(x, y, 480, 150, 20, '#ffffff', '#e2e8f0');
            text(name, x + 22, y + 22, 22, 900);
            text(status, x + 22, y + 58, 13, 900, status === 'Allineato' ? '#059669' : '#d97706');
            text('Avanzamento costi', x + 22, y + 95, 12, 900, '#64748b');
            fillRound(x + 22, y + 120, 420, 10, 8, '#e2e8f0');
            fillRound(x + 22, y + 120, 420 * percent / 100, 10, 8, percent > 75 ? '#d97706' : '#4f46e5');
        }

        function drawLogin(t) {
            ctx.fillStyle = '#eef2ff';
            ctx.fillRect(0, 0, W, H);
            card(665, 170, 590, 680, '');
            text('ARCH', 775, 245, 42, 900);
            text('TIME', 895, 245, 42, 900, '#4f46e5');
            text('PRO', 1035, 245, 42, 900);
            text('Accesso beta', 960, 330, 18, 900, '#64748b', 'center');
            input(745, 405, 430, 'EMAIL', 'demo@archtimepro.it');
            input(745, 500, 430, 'PASSWORD', '••••••••••');
            button(745, 620, 430, 'ACCEDI ORA', true);
        }

        function drawOnboarding(step, t) {
            drawShell(t, 'Gestione');
            fillRound(520, 180, 880, 700, 28, '#ffffff', '#e2e8f0');
            text('Configura il tuo spazio', 590, 250, 36, 900);
            text('Tre passaggi veloci per partire con dati ordinati.', 590, 302, 18, 700, '#64748b');
            const y = step === 'identity' ? 390 : step === 'rate' ? 500 : 610;
            fillRound(590, y - 15, 740, 100, 18, step === 'rate' ? '#eef2ff' : '#f8fafc', '#e2e8f0');
            text('1', 625, 398, 18, 900, '#4f46e5');
            text('Identita studio', 660, 398, 18, 900);
            text('Studio Demo Morelli', 660, 430, 15, 700, '#64748b');
            text('2', 625, 508, 18, 900, '#4f46e5');
            text('Costo orario', 660, 508, 18, 900);
            text('EUR 52 / h - modificabile dalla tab Team', 660, 540, 15, 700, '#64748b');
            text('3', 625, 618, 18, 900, '#4f46e5');
            text('Primo lavoro', 660, 618, 18, 900);
            text('Villa Rossi - budget EUR 12.000', 660, 650, 15, 700, '#64748b');
            button(590, 745, 740, 'PREPARA IL PRIMO LAVORO', true);
        }

        function drawProjectModal(t) {
            drawDashboard(t);
            ctx.fillStyle = 'rgba(15,23,42,0.38)';
            ctx.fillRect(0, 0, W, H);
            fillRound(330, 140, 1260, 780, 28, '#ffffff', '#e2e8f0');
            text('Nuovo progetto', 400, 205, 28, 900);
            text('Anagrafica', 430, 290, 14, 900, '#64748b');
            input(430, 325, 420, 'NOME', 'Villa Rossi');
            input(430, 420, 420, 'CLIENTE', 'Rossi Maria');
            text('Budget totale', 430, 528, 13, 900, '#64748b');
            fillRound(430, 555, 190, 35, 10, '#0f172a');
            text('LIBERO', 525, 565, 12, 900, '#fff', 'center');
            fillRound(630, 555, 220, 35, 10, '#fff', '#e2e8f0');
            text('SOMMA ATTIVITA', 740, 565, 12, 900, '#64748b', 'center');
            input(430, 610, 420, 'BUDGET', '12000');

            text('Template e attivita', 950, 290, 14, 900, '#64748b');
            fillRound(950, 325, 470, 52, 12, '#ffffff', '#e2e8f0');
            text('Ristrutturazione leggera', 970, 342, 16, 800, '#334155');
            taskRow(950, 410, 'Sopralluogo', 'Fuori piano');
            taskRow(950, 480, 'Progetto definitivo', 'EUR 4.000');
            taskRow(950, 550, 'Direzione lavori', 'EUR 8.000');
            fillRound(950, 650, 320, 46, 12, '#ffffff', '#e2e8f0');
            text('Nuova attivita al volo', 970, 664, 14, 700, '#94a3b8');
            button(1285, 650, 135, 'CREA', false);
            button(400, 815, 1120, 'CREA PROGETTO', true);
        }

        function taskRow(x, y, name, price) {
            fillRound(x, y, 470, 52, 12, '#ffffff', '#e2e8f0');
            text(name, x + 18, y + 13, 15, 900);
            text(price, x + 440, y + 16, 13, 900, price.includes('EUR') ? '#4f46e5' : '#94a3b8', 'right');
        }

        function drawTimer(t, mode) {
            drawShell(t, 'Lavoro');
            card(120, 230, 540, 620, 'Timer');
            input(160, 305, 460, 'PROGETTO', 'Villa Rossi');
            input(160, 400, 460, 'ATTIVITA', 'Progetto definitivo');
            const running = mode === 'running';
            text(running ? '00:18:42' : mode === 'saved' ? '00:00:00' : '00:00:00', 390, 535, 62, 900, '#0f172a', 'center');
            button(160, 655, 460, running ? 'FERMA TIMER' : 'AVVIA ORA', true);
            card(720, 230, 1040, 620, 'Registro attivita');
            tableRow(770, 320, 'Oggi', 'Stefano', 'Villa Rossi', 'Progetto definitivo', running ? 'In corso' : '00:18');
            tableRow(770, 390, 'Oggi', 'Laura', 'Villa Rossi', 'Sopralluogo', '01:30');
            if (mode === 'manual') {
                fillRound(1110, 540, 470, 220, 24, '#ffffff', '#e2e8f0');
                text('Inserimento manuale', 1160, 595, 24, 900);
                text('09:00 - 11:30', 1160, 650, 32, 900, '#4f46e5');
            }
        }

        function tableRow(x, y, date, user, project, task, time) {
            fillRound(x, y, 900, 54, 12, '#f8fafc', '#e2e8f0');
            text(date, x + 20, y + 18, 13, 900, '#64748b');
            text(user, x + 135, y + 18, 13, 900);
            text(project, x + 285, y + 18, 13, 900);
            text(task, x + 500, y + 18, 13, 900, '#475569');
            text(time, x + 850, y + 18, 13, 900, '#4f46e5', 'right');
        }

        function drawDetail(t, mode) {
            drawDashboard(t);
            ctx.fillStyle = 'rgba(15,23,42,0.38)';
            ctx.fillRect(0, 0, W, H);
            fillRound(250, 110, 1420, 860, 28, '#ffffff', '#e2e8f0');
            text('Villa Rossi', 330, 180, 36, 900);
            text('Budget EUR 12.000 - Speso EUR 4.180', 330, 228, 18, 800, '#64748b');
            text('Ritmo progetto', 330, 315, 18, 900);
            fillRound(330, 360, 900, 18, 9, '#e2e8f0');
            fillRound(330, 360, 360, 18, 9, mode === 'warning' ? '#dc2626' : '#4f46e5');
            fillRound(780, 350, 8, 38, 5, '#059669');
            text('Costi 40%', 330, 395, 14, 900, mode === 'warning' ? '#dc2626' : '#64748b');
            text('Piano costi 50%', 1070, 395, 14, 900, '#059669', 'right');
            taskStatus(330, 500, 'Sopralluogo', 'Completata', 'Fuori piano');
            taskStatus(330, 585, 'Progetto definitivo', 'In corso', 'EUR 4.000');
            taskStatus(330, 670, 'Direzione lavori', 'Da fare', 'EUR 8.000');
            if (mode === 'warning') {
                fillRound(980, 520, 520, 180, 22, '#fef2f2', '#fecaca');
                text('Attenzione', 1030, 575, 26, 900, '#dc2626');
                text('I costi stanno correndo piu del lavoro completato.', 1030, 625, 18, 800, '#7f1d1d');
            }
        }

        function taskStatus(x, y, name, state, weight) {
            fillRound(x, y, 900, 58, 14, '#f8fafc', '#e2e8f0');
            text(name, x + 18, y + 18, 16, 900);
            text(state, x + 520, y + 18, 14, 900, state === 'Completata' ? '#059669' : '#d97706');
            text(weight, x + 860, y + 18, 14, 900, weight.includes('EUR') ? '#4f46e5' : '#94a3b8', 'right');
        }

        function drawTeam(t) {
            drawShell(t, 'Gestione');
            card(120, 230, 600, 620, 'Team');
            memberRow(160, 310, 'Stefano Morelli', 'Admin', 'EUR 52/h');
            memberRow(160, 390, 'Laura Bianchi', 'Staff', 'EUR 38/h');
            memberRow(160, 470, 'Marco Verdi', 'Staff', 'EUR 42/h');
            fillRound(860, 300, 620, 360, 24, '#ffffff', '#e2e8f0');
            text('Modifica collaboratore', 930, 370, 30, 900);
            input(930, 440, 430, 'NOME', 'Laura Bianchi');
            input(930, 535, 430, 'COSTO ORARIO', '38');
            button(930, 650, 430, 'SALVA MODIFICHE', true);
        }

        function memberRow(x, y, name, role, cost) {
            fillRound(x, y, 500, 58, 14, '#f8fafc', '#e2e8f0');
            text(name, x + 18, y + 13, 16, 900);
            text(role, x + 18, y + 36, 11, 900, '#64748b');
            text(cost, x + 460, y + 20, 14, 900, '#4f46e5', 'right');
        }

        function drawAnalytics(t, mode) {
            drawDashboard(t);
            if (mode === 'modal' || mode === 'report') {
                ctx.fillStyle = 'rgba(15,23,42,0.38)';
                ctx.fillRect(0, 0, W, H);
                fillRound(300, 140, 1320, 760, 28, '#ffffff', '#e2e8f0');
                text('Dettaglio analisi', 380, 210, 34, 900);
                chart(380, 310, 540, 300, '#4f46e5');
                chart(1000, 310, 470, 300, '#d97706');
                if (mode === 'report') button(600, 720, 720, 'GENERA REPORT PDF', true);
            }
        }

        function chart(x, y, w, h, color) {
            fillRound(x, y, w, h, 20, '#f8fafc', '#e2e8f0');
            ctx.strokeStyle = color;
            ctx.lineWidth = 8;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const px = x + 60 + i * ((w - 120) / 5);
                const py = y + h - 60 - [40, 80, 65, 120, 155, 190][i];
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
        }

        function drawFlow(clip, t) {
            const segment = Math.min(clip.flow.length - 1, Math.floor(t / (DURATION / clip.flow.length)));
            const scene = clip.flow[segment];
            if (scene === 'login') drawLogin(t);
            else if (scene === 'onboardingIdentity') drawOnboarding('identity', t);
            else if (scene === 'onboardingRate') drawOnboarding('rate', t);
            else if (scene === 'firstProject') drawOnboarding('project', t);
            else if (scene === 'dashboard' || scene === 'compactInsights') drawDashboard(t);
            else if (scene === 'projectModal' || scene === 'budgetMode' || scene === 'taskPlan') drawProjectModal(t);
            else if (scene === 'timerReady') drawTimer(t, 'ready');
            else if (scene === 'timerRunning') drawTimer(t, 'running');
            else if (scene === 'timerSaved') drawTimer(t, 'saved');
            else if (scene === 'manualHours') drawTimer(t, 'manual');
            else if (scene === 'projectDetail' || scene === 'taskStatus' || scene === 'rhythmBar') drawDetail(t, 'normal');
            else if (scene === 'warning') drawDetail(t, 'warning');
            else if (scene === 'teamPanel') drawTeam(t);
            else if (scene === 'memberEdit' || scene === 'hourlyCost' || scene === 'teamSaved') drawTeam(t);
            else if (scene === 'analyticsModal') drawAnalytics(t, 'modal');
            else if (scene === 'report') drawAnalytics(t, 'report');
            else drawDashboard(t);
        }

        function drawOverlay(clip, t) {
            const item = clip.overlay.find(row => t >= row[0] && t < row[1]);
            if (!item) return;
            const local = (t - item[0]) / (item[1] - item[0]);
            const alpha = Math.min(1, Math.min(local * 4, (1 - local) * 4));
            ctx.save();
            ctx.globalAlpha = Math.max(0, alpha);
            fillRound(390, 900, 1140, 86, 22, 'rgba(15,23,42,0.88)');
            text(item[2], 960, 927, 30, 900, '#ffffff', 'center');
            ctx.restore();
        }

        function drawFrame(clip, frame) {
            const t = frame / FPS;
            drawFlow(clip, t);
            drawOverlay(clip, t);
        }

        async function renderClip(clip) {
            setStatus(`Genero: ${clip.title}...`);
            document.querySelectorAll('button').forEach(button => button.disabled = true);
            const stream = canvas.captureStream(FPS);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            const chunks = [];
            recorder.ondataavailable = event => {
                if (event.data.size > 0) chunks.push(event.data);
            };
            recorder.start();
            const totalFrames = DURATION * FPS;
            for (let frame = 0; frame < totalFrames; frame++) {
                drawFrame(clip, frame);
                await new Promise(resolve => setTimeout(resolve, 1000 / FPS));
            }
            recorder.stop();
            await new Promise(resolve => recorder.onstop = resolve);
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `arch-time-pro-${clip.id}.webm`;
            link.click();
            URL.revokeObjectURL(url);
            document.querySelectorAll('button').forEach(button => button.disabled = false);
            setStatus(`Scaricato: arch-time-pro-${clip.id}.webm`);
        }

        drawFrame(clips[0], 0);
    </script>
</body>
</html>
